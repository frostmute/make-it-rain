---
name: Bug Report
description: Report a problem with the plugin
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the details below.
  
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect to happen?
      placeholder: Describe the bug clearly...
    validations:
      required: true
  
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  
  - type: input
    id: version
    attributes:
      label: Plugin Version
      description: What version of Make It Rain are you using?
      placeholder: e.g., 1.7.1
    validations:
      required: true
  
  - type: input
    id: obsidian_version
    attributes:
      label: Obsidian Version
      description: What version of Obsidian are you running?
      placeholder: e.g., v1.8.10
  
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows
        - macOS
        - Linux
        - iOS
        - Android
  
  - type: textarea
    id: logs
    attributes:
      label: Console Logs (if applicable)
      description: Open Developer Console (Ctrl+Shift+I or Cmd+Option+I) and paste any errors
      render: shell
