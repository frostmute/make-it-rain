name: Automated Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New version number (e.g., 1.0.0)'
        required: true
      skip_version_bump:
        description: 'Skip version bumping (if already done manually)'
        type: boolean
        default: false
      force:
        description: 'Force overwrite existing release'
        type: boolean
        default: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for tags

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Check current version
        id: check_version
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          INPUT_VERSION="${{ inputs.version }}"
          echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "input=$INPUT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION"
          echo "Input version: $INPUT_VERSION"
          
          if [ "$CURRENT_VERSION" = "$INPUT_VERSION" ]; then
            echo "versions_match=true" >> $GITHUB_OUTPUT
            echo "✓ Versions already match - will skip version bump"
          else
            echo "versions_match=false" >> $GITHUB_OUTPUT
            echo "✗ Versions differ - will update files"
          fi

      - name: Install dependencies
        run: npm install

      - name: Run build script
        run: npm run build

      - name: List files for debugging
        run: ls -la build/

      - name: Update version in files
        if: steps.check_version.outputs.versions_match == 'false' && inputs.skip_version_bump == false
        run: |
          VERSION=${{ inputs.version }}
          echo "Updating version to $VERSION"
          
          # Update package.json (in root)
          node -e "
            const fs = require('fs');
            const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            packageJson.version = process.argv[1];
            fs.writeFileSync('package.json', JSON.stringify(packageJson, null, 2));
          " $VERSION

          # Update manifest.json (in build directory)
          node -e "
            const fs = require('fs');
            const manifestJson = JSON.parse(fs.readFileSync('build/manifest.json', 'utf8'));
            manifestJson.version = process.argv[1];
            fs.writeFileSync('build/manifest.json', JSON.stringify(manifestJson, null, '\t'));
          " $VERSION

          # Update versions.json (in root)
          node -e "
            const fs = require('fs');
            const versionsJson = JSON.parse(fs.readFileSync('versions.json', 'utf8'));
            const manifestJson = JSON.parse(fs.readFileSync('build/manifest.json', 'utf8'));
            versionsJson[process.argv[1]] = manifestJson.minAppVersion;
            fs.writeFileSync('versions.json', JSON.stringify(versionsJson, null, '\t'));
          " $VERSION

          echo "Version updated successfully."

      - name: Commit version changes
        if: steps.check_version.outputs.versions_match == 'false' && inputs.skip_version_bump == false
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add package.json versions.json
          git add -f build/manifest.json
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit - skipping"
          else
            git commit -m "chore: release ${{ inputs.version }}"
            git push origin main
          fi

      - name: Check if tag exists
        id: check_tag
        run: |
          TAG_NAME=v${{ inputs.version }}
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG_NAME already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG_NAME does not exist - will create"
          fi

      - name: Create Git Tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          TAG_NAME=v${{ inputs.version }}
          git tag $TAG_NAME
          git push origin $TAG_NAME

      - name: Create Plugin Zip
        run: |
          cd build
          zip -r ../make-it-rain.zip main.js manifest.json styles.css
          cd ..
          echo "Created make-it-rain.zip with contents:"
          unzip -l make-it-rain.zip

      - name: Check if release exists
        id: check_release
        run: |
          TAG_NAME=v${{ inputs.version }}
          if gh release view "$TAG_NAME" --repo ${{ github.repository }} >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Release $TAG_NAME already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Release $TAG_NAME does not exist - will create"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete existing release (if force enabled)
        if: steps.check_release.outputs.exists == 'true' && inputs.force == true
        run: |
          TAG_NAME=v${{ inputs.version }}
          gh release delete "$TAG_NAME" --repo ${{ github.repository }} --yes
          echo "Deleted existing release $TAG_NAME"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: Release v${{ inputs.version }}
          body_path: ./release-notes-${{ inputs.version }}.md
          draft: false
          prerelease: false
          files: |
            make-it-rain.zip
            build/main.js
            build/manifest.json
            build/styles.css
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload assets to existing release (if not recreated)
        if: steps.check_release.outputs.exists == 'true' && inputs.force == false
        run: |
          TAG_NAME=v${{ inputs.version }}
          echo "Uploading assets to existing release $TAG_NAME"
          gh release upload "$TAG_NAME" make-it-rain.zip build/main.js build/manifest.json build/styles.css --repo ${{ github.repository }} --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
