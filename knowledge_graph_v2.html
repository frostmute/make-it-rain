<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #0d1117; color: #c9d1d9; font-family: 'JetBrains Mono', monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
  h1 { color: #3fb950; }
  svg { border: 1px solid #30363d; border-radius: 8px; background: #161b22; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
  .node { fill: #21262d; stroke: #30363d; stroke-width: 2; rx: 10; ry: 10; }
  .core { stroke: #58a6ff; fill: #111b27; }      /* Blue: Core Logic */
  .ui { stroke: #bc8cff; fill: #1e152d; }        /* Purple: UI/Modals */
  .util { stroke: #3fb950; fill: #101e16; }      /* Green: Utilities */
  .external { stroke: #f0883e; fill: #261a11; }  /* Orange: APIs */
  .settings { stroke: #d29922; fill: #251e11; }  /* Yellow: Config */
  .text { fill: #c9d1d9; font-size: 13px; pointer-events: none; }
  .title { font-weight: bold; font-size: 14px; }
  .arrow { stroke: #8b949e; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
  .badge { fill: #3fb950; font-size: 10px; font-weight: bold; }
</style>
</head>
<body>
  <h1>make-it-rain Knowledge Graph [v2.0 - Refactored]</h1>
  <svg width="1100" height="800" viewBox="0 0 1100 800">
    <!-- DEFINITIONS -->
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#8b949e" />
      </marker>
    </defs>

    <!-- EXTERNAL APIs -->
    <rect x="50" y="50" width="180" height="80" class="node external" />
    <text x="65" y="80" class="text title">Raindrop.io API</text>
    <text x="65" y="100" class="text">Bookmarks, Highlights</text>

    <rect x="870" y="50" width="180" height="80" class="node external" />
    <text x="885" y="80" class="text title">Obsidian API</text>
    <text x="885" y="100" class="text">Vault, UI, Workspace</text>

    <!-- SETTINGS (REFACTORED OUT) -->
    <rect x="830" y="250" width="220" height="120" class="node settings" />
    <text x="845" y="280" class="text title">src/settings.ts</text>
    <text x="845" y="305" class="text">- DEFAULT_SETTINGS</text>
    <text x="845" y="325" class="text">- SettingTab UI</text>
    <rect x="980" y="260" width="60" height="20" rx="5" fill="#3fb950" />
    <text x="985" y="274" class="text" font-size="10" fill="#000">MODULAR</text>

    <!-- CORE REFACTORED -->
    <rect x="400" y="200" width="300" height="160" class="node core" />
    <text x="415" y="235" class="text title">src/main.ts (Core)</text>
    <text x="415" y="260" class="text">- RaindropToObsidian Class</text>
    <text x="415" y="280" class="text">- processRaindrops Loop</text>
    <text x="415" y="300" class="text">- Concurrency Mgmt</text>
    <text x="415" y="320" class="text">- Template Rendering</text>
    <text x="415" y="340" class="text" fill="#3fb950" font-size="11">✓ Async Race Fix ✓ Update Logic</text>

    <!-- UI COMPONENTS (MODULARIZED) -->
    <rect x="50" y="250" width="220" height="120" class="node ui" />
    <text x="65" y="280" class="text title">src/modals.ts</text>
    <text x="65" y="305" class="text">- RaindropFetchModal</text>
    <text x="65" y="325" class="text">- QuickImportModal</text>
    <rect x="200" y="260" width="60" height="20" rx="5" fill="#3fb950" />
    <text x="205" y="274" class="text" font-size="10" fill="#000">MODULAR</text>

    <!-- UTILITIES (ENHANCED) -->
    <rect x="300" y="450" width="500" height="200" class="node util" />
    <text x="315" y="485" class="text title">src/utils/</text>
    <text x="330" y="510" class="text">apiUtils.ts:   Auth, Hierarchy, RateLimit</text>
    <text x="330" y="535" class="text">fileUtils.ts:  Sanitize, Folder IO</text>
    <text x="330" y="560" class="text">yamlUtils.ts:  Frontmatter Generator</text>
    <text x="330" y="585" class="text">formatUtils.ts: Date/Tag/Domain Formatting</text>
    <rect x="730" y="575" width="60" height="20" rx="5" fill="#3fb950" />
    <text x="735" y="589" class="text" font-size="10" fill="#000">ENHANCED</text>
    
    <!-- TYPES -->
    <rect x="400" y="700" width="300" height="60" class="node" style="stroke: #79c0ff;" />
    <text x="415" y="725" class="text title">src/types.ts</text>
    <text x="415" y="745" class="text">Interfaces & Union Types</text>

    <!-- CONNECTIONS -->
    <!-- Core to APIs -->
    <path d="M 400 210 L 230 130" class="arrow" /> <!-- Core -> Raindrop -->
    <path d="M 700 210 L 870 130" class="arrow" /> <!-- Core -> Obsidian -->

    <!-- Core to Modules -->
    <path d="M 400 275 L 270 275" class="arrow" /> <!-- Core -> Modals -->
    <path d="M 700 275 L 830 275" class="arrow" /> <!-- Core -> Settings -->

    <!-- Core to Utils -->
    <path d="M 550 360 L 550 450" class="arrow" /> <!-- Core -> Utils -->
    
    <!-- Utils to Types -->
    <path d="M 550 650 L 550 700" class="arrow" /> <!-- Utils -> Types -->

    <!-- Utils to APIs -->
    <path d="M 300 540 Q 140 540 140 130" class="arrow" /> <!-- Utils -> Raindrop -->
    <path d="M 800 540 Q 960 540 960 130" class="arrow" /> <!-- Utils -> Obsidian -->

  </svg>

  <div style="margin-top: 20px; text-align: center; max-width: 800px;">
    <p><b>v2.0 Key Updates:</b> Settings logic extracted to standalone module. New formatting utility layer introduced. 
    Main class hardened with concurrency safety and correct update-check logic.</p>
  </div>
</body>
</html>
